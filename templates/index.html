<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - Descargas Rápidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="container">
        <h1>Downloader</h1>
        <p>Descarga contenido de YouTube en alta definición o audio MP3 al instante.</p>
        
        <form action="/download" method="POST" id="downloadForm">
            <div class="input-group">
                <label for="url">Enlace del Video</label>
                <input type="text" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required autocomplete="off">
            </div>
            
            <div class="options-group">
                <div class="option-card">
                    <input type="radio" id="opt-video" name="format_type" value="video" checked>
                    <label for="opt-video" class="option-label">🎬 Vídeo MP4</label>
                </div>
                <div class="option-card">
                    <input type="radio" id="opt-audio" name="format_type" value="audio">
                    <label for="opt-audio" class="option-label">🎵 Audio MP3</label>
                </div>
            </div>
            
            <button type="submit" class="btn-download" id="submitBtn">Comenzar Descarga</button>
        </form>
        <div class="status" id="statusMessage">Descargando y procesando en el servidor... Por favor espera.</div>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evitamos la redirección nativa del formulario

            btn.disabled = true;
            btn.textContent = 'Procesando...';
            status.classList.add('visible');

            const formData = new FormData(form);

            try {
                // Hacemos la petición POST de forma asíncrona mediante fetch
                const response = await fetch('/download', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Error desconocido al descargar');
                }

                // Intentamos extraer el nombre del archivo del header Content-Disposition
                let filename = 'descarga.mp4';
                const disposition = response.headers.get('content-disposition');
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) { 
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                // Obtenemos los datos del archivo en forma de Blob (binario)
                const blob = await response.blob();

                // Creamos un link temporal e invisible para forzar la descarga en el cliente
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);

            } catch (error) {
                alert('Ocurrió un error: ' + error.message);
            } finally {
                // Al finalizar (éxito o error), restablecemos el botón
                btn.disabled = false;
                btn.textContent = 'Comenzar Descarga';
                status.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
